version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: apex_postgres
    environment:
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: apex_pass
      POSTGRES_DB: apex_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: apex_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://apex:apex_pass@postgres:5432/apex_db
      ENVIRONMENT: development
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  postgres_data:
